# =============================================================================
# SEKT6R Bot-Stack â€” Docker Compose (mit bestehender Traefik-Integration)
# =============================================================================
# Setup: Hostinger KVM 2 + Cloudflare DNS+Proxy + existierender Traefik
# Domains: bots.sektorrp.eu + crime/liberty/ticket/countdown.bots.sektorrp.eu
#
# Traefik (im proxy-Network) routet HTTPS-Traffic automatisch
# an unsere Container anhand der Labels.
#
# Start auf VPS:
#   cp .env.example .env
#   nano .env  # Werte eintragen (Discord-Tokens, API-Keys, etc.)
#   docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # kommandozentrale â€” Web-Dashboard zum Steuern aller Bots
  # Route: https://bots.sektorrp.eu/
  # ---------------------------------------------------------------------------
  kommandozentrale:
    build:
      context: ./kommandozentrale
      dockerfile: Dockerfile
    container_name: sekt6r-kommandozentrale
    restart: unless-stopped
    environment:
      ADMIN_USERNAME: "${KZ_ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${KZ_ADMIN_PASSWORD}"
      TZ: Europe/Berlin
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sekt6r-net
      - proxy
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy"
      traefik.http.routers.sekt6r-kz.entrypoints: "websecure"
      traefik.http.routers.sekt6r-kz.rule: "Host(`bots.sektorrp.eu`)"
      traefik.http.routers.sekt6r-kz.tls: "true"
      traefik.http.routers.sekt6r-kz.tls.certresolver: "letsencrypt"
      traefik.http.services.sekt6r-kz.loadbalancer.server.port: "8000"

  # ---------------------------------------------------------------------------
  # crime-backend â€” Il Padrino (Crime Automation FastAPI-Backend)
  # Route: https://crime.bots.sektorrp.eu/
  # ---------------------------------------------------------------------------
  crime-backend:
    build:
      context: ../
      dockerfile: docker/crime/Dockerfile.backend
    container_name: sekt6r-crime-backend
    restart: unless-stopped
    environment:
      DISCORD_BOT_TOKEN: "${CRIME_DISCORD_BOT_TOKEN}"
      DISCORD_GUILD_ID: "${CRIME_DISCORD_GUILD_ID}"
      ANTHROPIC_API_KEY: "${CRIME_ANTHROPIC_API_KEY}"
      OPENAI_API_KEY: "${CRIME_OPENAI_API_KEY:-}"
      DEFAULT_AI_PROVIDER: "${CRIME_DEFAULT_AI_PROVIDER:-anthropic}"
      DEFAULT_CLAUDE_MODEL: "${CRIME_DEFAULT_CLAUDE_MODEL:-claude-sonnet-4-5-20250929}"
      DEFAULT_OPENAI_MODEL: "${CRIME_DEFAULT_OPENAI_MODEL:-gpt-4o}"
      ADMIN_USERNAME: "${CRIME_ADMIN_USERNAME}"
      ADMIN_PASSWORD: "${CRIME_ADMIN_PASSWORD}"
      BACKEND_HOST: "0.0.0.0"
      BACKEND_PORT: "8000"
      BOT_API_URL: "http://crime-bot:8001"
      DB_PATH: "/app/data/crime.db"
      IMAGE_DIR: "/app/data/images"
      JOBS_API_KEY: "${JOBS_API_KEY}"
      TZ: Europe/Berlin
    volumes:
      - crime_data:/app/data
      - crime_logs:/app/logs
    networks:
      - sekt6r-net
      - proxy
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy"
      traefik.http.routers.sekt6r-crime.entrypoints: "websecure"
      traefik.http.routers.sekt6r-crime.rule: "Host(`crime.bots.sektorrp.eu`)"
      traefik.http.routers.sekt6r-crime.tls: "true"
      traefik.http.routers.sekt6r-crime.tls.certresolver: "letsencrypt"
      traefik.http.services.sekt6r-crime.loadbalancer.server.port: "8000"

  # ---------------------------------------------------------------------------
  # crime-bot â€” Il Padrino Discord-Bot (intern, kein Public-Route)
  # ---------------------------------------------------------------------------
  crime-bot:
    build:
      context: ../
      dockerfile: docker/crime/Dockerfile.bot
    container_name: sekt6r-crime-bot
    restart: unless-stopped
    environment:
      DISCORD_BOT_TOKEN: "${CRIME_DISCORD_BOT_TOKEN}"
      DISCORD_GUILD_ID: "${CRIME_DISCORD_GUILD_ID}"
      ADMIN_USERNAME: "${CRIME_ADMIN_USERNAME}"
      ADMIN_PASSWORD: "${CRIME_ADMIN_PASSWORD}"
      BOT_API_HOST: "0.0.0.0"
      BOT_API_PORT: "8001"
      DB_PATH: "/app/data/crime.db"
      TZ: Europe/Berlin
    volumes:
      - crime_data:/app/data
      - crime_logs:/app/logs
    networks:
      - sekt6r-net
    depends_on:
      - crime-backend

  # ---------------------------------------------------------------------------
  # liberty-relay â€” Du bist Liberty (Ko-fi + Twitch + Admin-Panel)
  # Route: https://liberty.bots.sektorrp.eu/
  # ---------------------------------------------------------------------------
  liberty-relay:
    build:
      context: ./liberty
      dockerfile: Dockerfile
    container_name: sekt6r-liberty
    restart: unless-stopped
    environment:
      DISCORD_WEBHOOK_URL: "${LIBERTY_DISCORD_WEBHOOK_URL}"
      DISCORD_USERNAME: "${LIBERTY_DISCORD_USERNAME:-Liberty City}"
      DISCORD_AVATAR_URL: "${LIBERTY_DISCORD_AVATAR_URL:-}"
      LIBERTY_EMOJI: "${LIBERTY_EMOJI:-ðŸ—½}"
      GOAL_NETTO_EUR: "${LIBERTY_GOAL_NETTO_EUR:-100}"
      PROGRESS_BAR_LENGTH: "${LIBERTY_PROGRESS_BAR_LENGTH:-12}"
      TWITCH_CLIENT_ID: "${LIBERTY_TWITCH_CLIENT_ID}"
      TWITCH_CLIENT_SECRET: "${LIBERTY_TWITCH_CLIENT_SECRET}"
      TWITCH_BROADCASTER_LOGIN: "${LIBERTY_TWITCH_BROADCASTER_LOGIN}"
      TWITCH_BROADCASTER_ID: "${LIBERTY_TWITCH_BROADCASTER_ID}"
      TWITCH_EVENTSUB_SECRET: "${LIBERTY_TWITCH_EVENTSUB_SECRET}"
      KOFI_VERIFICATION_TOKEN: "${LIBERTY_KOFI_VERIFICATION_TOKEN}"
      KOFI_FEE_PERCENT: "${LIBERTY_KOFI_FEE_PERCENT:-5}"
      PAYPAL_FEE_PERCENT: "${LIBERTY_PAYPAL_FEE_PERCENT:-2.49}"
      PAYPAL_FEE_FIXED: "${LIBERTY_PAYPAL_FEE_FIXED:-0.35}"
      KOFI_LISTEN_HOST: "0.0.0.0"
      KOFI_LISTEN_PORT: "8080"
      DASHBOARD_LISTEN_HOST: "0.0.0.0"
      DASHBOARD_LISTEN_PORT: "8081"
      OBS_OVERLAY_ORIGIN: "${LIBERTY_OBS_OVERLAY_ORIGIN:-*}"
      ADMIN_USER: "${LIBERTY_ADMIN_USER}"
      ADMIN_PASS: "${LIBERTY_ADMIN_PASS}"
      TEBEX_SECRET_KEY: "${LIBERTY_TEBEX_SECRET_KEY:-}"
      LEADERBOARD_CACHE_TTL: "${LIBERTY_LEADERBOARD_CACHE_TTL:-60}"
      STATUS_REPOST_TO_BOTTOM: "${LIBERTY_STATUS_REPOST_TO_BOTTOM:-true}"
      STATUS_REPOST_COOLDOWN_SEC: "${LIBERTY_STATUS_REPOST_COOLDOWN_SEC:-300}"
      LOG_FILE: "/app/logs/liberty.log"
      LOG_MAX_BYTES: "${LIBERTY_LOG_MAX_BYTES:-5242880}"
      LOG_BACKUP_COUNT: "${LIBERTY_LOG_BACKUP_COUNT:-3}"
      TZ: Europe/Berlin
    volumes:
      - liberty_data:/app/data
      - liberty_logs:/app/logs
    networks:
      - sekt6r-net
      - proxy
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy"
      traefik.http.routers.sekt6r-liberty.entrypoints: "websecure"
      traefik.http.routers.sekt6r-liberty.rule: "Host(`liberty.bots.sektorrp.eu`)"
      traefik.http.routers.sekt6r-liberty.tls: "true"
      traefik.http.routers.sekt6r-liberty.tls.certresolver: "letsencrypt"
      traefik.http.services.sekt6r-liberty.loadbalancer.server.port: "8080"

  # ---------------------------------------------------------------------------
  # whitelist-bot â€” Discord-Bot, sync zu externer sektorrp.eu Webseiten-DB
  # (Discord-only, kein Public-Route)
  # ---------------------------------------------------------------------------
  whitelist-bot:
    build:
      context: ./whitelist
      dockerfile: Dockerfile
    container_name: sekt6r-whitelist
    restart: unless-stopped
    environment:
      BOT_TOKEN: "${WHITELIST_BOT_TOKEN}"
      DB_HOST: "${WHITELIST_DB_HOST}"
      DB_NAME: "${WHITELIST_DB_NAME}"
      DB_USER: "${WHITELIST_DB_USER}"
      DB_PASS: "${WHITELIST_DB_PASS}"
      GUILD_ID: "${WHITELIST_GUILD_ID}"
      WHITELIST_ROLE_ID: "${WHITELIST_ROLE_ID}"
      TZ: Europe/Berlin
    networks:
      - sekt6r-net

  # ---------------------------------------------------------------------------
  # ticket-bot â€” RAG-gestÃ¼tzte Ticket-Verwaltung (Discord + Claude + ChromaDB)
  # Route: https://ticket.bots.sektorrp.eu/
  # ---------------------------------------------------------------------------
  ticket-bot:
    build:
      context: ./ticket
      dockerfile: Dockerfile
    container_name: sekt6r-ticket
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: "${TICKET_DISCORD_TOKEN}"
      ANTHROPIC_API_KEY: "${TICKET_ANTHROPIC_API_KEY}"
      DISCORD_GUILD_ID: "${TICKET_DISCORD_GUILD_ID}"
      TICKET_CHANNEL_ID: "${TICKET_CHANNEL_ID}"
      MOD_ROLE_ID: "${TICKET_MOD_ROLE_ID}"
      TICKET_ACCESS_ROLE_ID: "${TICKET_ACCESS_ROLE_ID}"
      TICKET_CATEGORY_ID: "${TICKET_CATEGORY_ID}"
      TICKET_ARCHIVE_CHANNEL_ID: "${TICKET_ARCHIVE_CHANNEL_ID:-}"
      CLAUDE_MODEL: "${TICKET_CLAUDE_MODEL:-claude-sonnet-4-5-20250929}"
      EMBED_MODEL: "${TICKET_EMBED_MODEL:-sentence-transformers/multilingual-e5-small}"
      CONFIDENCE_THRESHOLD: "${TICKET_CONFIDENCE_THRESHOLD:-0.6}"
      MAX_TOKENS: "${TICKET_MAX_TOKENS:-1500}"
      TOP_K: "${TICKET_TOP_K:-5}"
      SNIPPET_THRESHOLD: "${TICKET_SNIPPET_THRESHOLD:-0.3}"
      SILENT_MENTIONS: "${TICKET_SILENT_MENTIONS:-true}"
      ADMIN_USER: "${TICKET_ADMIN_USER}"
      ADMIN_PASSWORD: "${TICKET_ADMIN_PASSWORD}"
      ADMIN_HOST: "0.0.0.0"
      ADMIN_PORT: "5555"
      HF_HOME: "/app/hf-cache"
      TZ: Europe/Berlin
    volumes:
      - ticket_data:/app/data
      - ticket_kb:/app/kb
      - ticket_hf:/app/hf-cache
      - ticket_logs:/app/logs
    networks:
      - sekt6r-net

  # ---------------------------------------------------------------------------
  # countdown-bot â€” Discord + Flask Web-Admin
  # Route: https://countdown.bots.sektorrp.eu/
  # ---------------------------------------------------------------------------
  countdown-bot:
    build:
      context: ./countdown
      dockerfile: Dockerfile
    container_name: sekt6r-countdown
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: "${COUNTDOWN_DISCORD_TOKEN}"
      ADMIN_HOST: "0.0.0.0"
      ADMIN_PORT: "5601"
      TZ: Europe/Berlin
    volumes:
      - countdown_data:/app/data
      - countdown_logs:/app/logs
    networks:
      - sekt6r-net

  # ---------------------------------------------------------------------------
  # jobs-dashboard - SEKTOR Personal-Boerse (Discord-Login + Slot-Eintragung)
  # Route: https://jobs.bots.sektorrp.eu/
  # Holt Auftraege+Slots vom crime-backend (Public-API, X-API-Key=JOBS_API_KEY)
  # ---------------------------------------------------------------------------
  jobs-dashboard:
    build:
      context: ./jobs
      dockerfile: Dockerfile
    container_name: sekt6r-jobs
    restart: unless-stopped
    environment:
      DISCORD_CLIENT_ID: "${JOBS_DISCORD_CLIENT_ID}"
      DISCORD_CLIENT_SECRET: "${JOBS_DISCORD_CLIENT_SECRET}"
      DISCORD_REDIRECT_URI: "${JOBS_DISCORD_REDIRECT_URI:-https://jobs.bots.sektorrp.eu/auth/callback}"
      DISCORD_GUILD_ID: "${CRIME_DISCORD_GUILD_ID}"
      REQUIRED_ROLE_ID: "${JOBS_REQUIRED_ROLE_ID:-1528099740649127977}"
      ADMIN_ROLE_ID: "${JOBS_ADMIN_ROLE_ID:-1431562679545364582}"
      ADMIN_USER_IDS: "${JOBS_ADMIN_USER_IDS:-584086760284487697}"
      SESSION_SECRET: "${JOBS_SESSION_SECRET}"
      CRIME_BACKEND_URL: "${JOBS_CRIME_BACKEND_URL:-http://sekt6r-crime-backend:8000}"
      CRIME_API_KEY: "${JOBS_API_KEY}"
      # Mehrere Event-Zeitraeume: "start~ende:Label" kommagetrennt
      EVENT_PERIODS: "${JOBS_EVENT_PERIODS:-2026-07-19T00:00~2026-07-26T23:59:Testphase,2026-08-07T18:00~2026-08-16T23:50:Liberty erwacht...}"
      # Alt-Variablen: nur setzen, wenn der erste Zeitraum uebersteuert werden soll
      EVENT_START: "${JOBS_EVENT_START:-}"
      EVENT_END: "${JOBS_EVENT_END:-}"
      TZ: Europe/Berlin
    volumes:
      - jobs_data:/app/data
    networks:
      - sekt6r-net
      - proxy
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy"
      traefik.http.routers.sekt6r-jobs.entrypoints: "websecure"
      traefik.http.routers.sekt6r-jobs.rule: "Host(`jobs.bots.sektorrp.eu`)"
      traefik.http.routers.sekt6r-jobs.tls: "true"
      traefik.http.routers.sekt6r-jobs.tls.certresolver: "letsencrypt"
      traefik.http.services.sekt6r-jobs.loadbalancer.server.port: "8080"

  # ---------------------------------------------------------------------------
  # dbadmin - sqlite-web fuer crime.db (READ-ONLY, das SQLite-"phpMyAdmin")
  # Route: https://db.bots.sektorrp.eu/  (zusaetzlich per Basic-Auth geschuetzt)
  #
  # Zwei Schutzschichten:
  #   1. Traefik-Middleware sekt6r-dbauth (Basic-Auth, Hash in DBADMIN_AUTH)
  #   2. sqlite_web --read-only: keine Schreibzugriffe ueber das UI
  # Volume bewusst schreibbar (SQLite braucht WAL/SHM auch beim Lesen).
  # ---------------------------------------------------------------------------
  dbadmin:
    build:
      context: ./dbadmin
      dockerfile: Dockerfile
    container_name: sekt6r-dbadmin
    restart: unless-stopped
    environment:
      TZ: Europe/Berlin
    volumes:
      - crime_data:/data
    networks:
      - sekt6r-net
      - proxy
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy"
      traefik.http.routers.sekt6r-dbadmin.entrypoints: "websecure"
      traefik.http.routers.sekt6r-dbadmin.rule: "Host(`db.bots.sektorrp.eu`)"
      traefik.http.routers.sekt6r-dbadmin.tls: "true"
      traefik.http.routers.sekt6r-dbadmin.tls.certresolver: "letsencrypt"
      traefik.http.routers.sekt6r-dbadmin.middlewares: "sekt6r-dbauth"
      traefik.http.middlewares.sekt6r-dbauth.basicauth.users: "${DBADMIN_AUTH}"
      traefik.http.services.sekt6r-dbadmin.loadbalancer.server.port: "8080"


# =============================================================================
# Volumes
# =============================================================================
volumes:
  crime_data:
  crime_logs:
  liberty_data:
  liberty_logs:
  ticket_data:
  ticket_kb:
  ticket_hf:
  ticket_logs:
  countdown_data:
  countdown_logs:
  jobs_data:


# =============================================================================
# Networks
# - sekt6r-net: internes Bridge-Network fÃ¼r Container-zu-Container
# - proxy: EXTERN, existiert schon (Traefik+andere Services nutzen es)
# =============================================================================
networks:
  sekt6r-net:
    driver: bridge
    name: sekt6r-net

  proxy:
    external: true
    name: proxy
