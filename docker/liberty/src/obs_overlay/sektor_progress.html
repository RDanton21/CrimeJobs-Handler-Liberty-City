<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SEKTOR · Du bist Liberty — Progress</title>

  <!-- Webfonts non-blocking: rendert sofort mit Fallback, falls offline/blockiert -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Oxanium:wght@500;700;800&family=Orbitron:wght@600;800;900&display=swap"
        media="print" onload="this.media='all'" />
  <!--
    SEKTOR ROLEPLAY · OBS-OVERLAY (eigenständig, eine Datei).
    Zeigt den Live-Spenden-Fortschritt des "Du bist Liberty"-Goals (netto_total / goal).

    Einbinden in OBS:
      Quelle -> Browser -> URL oder lokale Datei. Breite 1920, Höhe 1080, Hintergrund transparent.

    WICHTIG (Font): Diese Datei nutzt die Hausschrift "Neuropol X" per relativem Pfad
    (Neuropol.otf muss im selben Ordner liegen). Fehlt sie, wird automatisch auf
    Oxanium/Orbitron (Google Fonts) zurückgefallen.

    API-Quelle (Reihenfolge):
      1. ?api=<URL>          -> explizit per Query-Parameter
      2. gleiche Origin       -> wenn über http(s) ausgeliefert (z.B. /overlay/sektor_progress.html) -> kein CORS
      3. DEFAULT_REMOTE_API   -> Fallback bei lokaler Datei (file://)
    Polling: ?ms=1500 (Default 1500ms, Minimum 500ms)

    CORS-Hinweis: Wird das Overlay als lokale Datei geladen (Origin "null") oder von einem
    anderen Host, muss das Relay den /api/stats-Abruf per CORS erlauben. Am robustesten:
    Datei über das Relay servieren (gleiche Origin) -> /overlay/sektor_progress.html
  -->
  <style>
    @font-face{
      font-family:"Neuropol X";
      src: url("Neuropol.otf") format("opentype");
      font-weight: 400 700;
      font-style: normal;
      font-display: swap;
    }

    :root{
      /* SEKTOR Gold-on-Dark */
      --gold:        #E8B24A;
      --gold-bright: #F6D27A;
      --gold-deep:   #B8801C;
      --maroon:      rgba(122, 18, 30, 0.55);
      --maroon-soft: rgba(92, 14, 24, 0.35);

      --ink-1: rgba(20, 12, 11, 0.86);
      --ink-2: rgba(9, 6, 6, 0.80);
      --stroke: rgba(232, 178, 74, 0.26);
      --stroke-soft: rgba(232, 178, 74, 0.14);

      --text:  #F3ECDD;
      --muted: #C9B89A;
      --dim:   #9A8B6F;

      --font-display:"Neuropol X","Oxanium","Orbitron","Segoe UI",system-ui,sans-serif;
      --font-body:"Inter","Segoe UI",system-ui,sans-serif;
    }

    *{box-sizing:border-box}
    html, body{ height:100%; }
    body{
      margin:0;
      background: transparent;            /* OBS: transparent durchscheinend */
      overflow:hidden;
      font-family: var(--font-body);
      color: var(--text);
    }

    /* Bühne: Box unten mittig (1920x1080) */
    .wrap{
      width:100%;
      min-height:100vh;
      padding:0 0 52px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }

    .card{
      width:min(1180px, 92vw);
      position:relative;
      overflow:hidden;
      border:1px solid var(--stroke);
      border-radius:20px;
      padding:13px 22px 12px;
      backdrop-filter: blur(14px);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015)),
        linear-gradient(180deg, var(--ink-1) 0%, var(--ink-2) 100%);
      box-shadow:
        0 0 44px rgba(232,178,74,0.10),
        0 18px 50px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }
    /* Maroon-Vignette in den Ecken (wie auf der Webseite) */
    .card::before{
      content:""; position:absolute; inset:0; z-index:1; pointer-events:none;
      background:
        radial-gradient(80% 130% at 100% 100%, var(--maroon), transparent 55%),
        radial-gradient(70% 120% at 0% 100%, var(--maroon-soft), transparent 55%);
    }
    /* Gold-Hairline oben */
    .card::after{
      content:""; position:absolute; left:18px; right:18px; top:0; height:1px; z-index:2;
      background: linear-gradient(90deg, transparent, rgba(232,178,74,0.85), rgba(246,210,122,0.85), transparent);
      pointer-events:none;
    }
    .card > .header, .card > .barRow, .card > .meta{ position:relative; z-index:3; }

    /* --- Hintergrund-Skyline mit Sonnenuntergang-Glow (gold) --- */
    .cityBg{ position:absolute; inset:0; z-index:1; pointer-events:none; overflow:hidden; border-radius:inherit; }
    .horizon{
      position:absolute; left:0; right:0; bottom:0; height:62%;
      background: radial-gradient(120% 90% at 50% 118%, rgba(232,178,74,0.20) 0%, rgba(184,128,28,0.10) 38%, transparent 70%);
    }
    .stars{
      position:absolute; left:0; right:0; top:0; bottom:48%; opacity:.35;
      background-image:
        radial-gradient(1.4px 1.4px at 18% 30%, #fff2d6, transparent),
        radial-gradient(1px 1px at 67% 16%, #fff, transparent),
        radial-gradient(1px 1px at 44% 50%, #ffe9c2, transparent),
        radial-gradient(1.4px 1.4px at 86% 28%, #ffe1a8, transparent),
        radial-gradient(1px 1px at 31% 13%, #fff, transparent);
    }
    .sun{
      position:absolute; bottom:28%; left:50%; transform:translateX(-50%);
      width:26px; height:26px; border-radius:50%;
      background: radial-gradient(circle at 50% 45%, #ffe6ac, #E8B24A 60%, rgba(184,128,28,0));
      box-shadow: 0 0 26px rgba(232,178,74,0.6), 0 0 60px rgba(232,178,74,0.3);
      opacity:.85;
    }
    .skyline{
      position:absolute; left:0; right:0; bottom:0; width:100%; height:60%; display:block;
      filter: drop-shadow(0 -2px 10px rgba(232,178,74,0.20));
    }
    .skyline .win{ fill:#E8B24A; }
    @keyframes twinkle{ 0%,100%{opacity:.18} 50%{opacity:.95} }
    .skyline .win.tw{ animation: twinkle 2.8s ease-in-out infinite; }

    /* --- Header --- */
    .header .title{
      margin-top:0;
      font-family: var(--font-display);
      text-transform:uppercase; letter-spacing:5px; font-weight:800;
      font-size:29px; line-height:1.02;
      color: var(--gold);
      background: linear-gradient(92deg, #F6D27A 0%, #E8B24A 45%, #C8901F 100%);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      filter: drop-shadow(0 0 14px rgba(232,178,74,0.35));
    }
    .header .subtitle2{ margin-top:5px; font-size:13px; color: var(--dim); }
    .header .subtitle2 .bold{ font-weight:700; color: var(--muted); }

    /* --- Progress-Bar --- */
    .barRow{ display:flex; align-items:center; gap:14px; margin-top:12px; }
    .barShell{
      position:relative; flex:1; height:22px; border-radius:999px; overflow:hidden;
      background: rgba(0,0,0,0.35);
      border:1px solid rgba(232,178,74,0.22);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
    }
    .barFill{
      height:100%; width:0%; border-radius:999px;
      background: linear-gradient(90deg, #B8801C 0%, #E8B24A 55%, #F6D27A 100%);
      box-shadow: 0 0 12px rgba(232,178,74,0.5);
      transition: width 650ms cubic-bezier(.2,.8,.2,1), background 350ms ease;
    }
    .barFill.glow{ box-shadow: 0 0 18px rgba(246,210,122,0.85), 0 0 34px rgba(232,178,74,0.45); }
    .barTicks{ position:absolute; inset:0; display:flex; pointer-events:none; }
    .barTicks span{ flex:1; border-right:1px dashed rgba(232,178,74,0.16); }
    .barTicks span:last-child{ border-right:none; }
    /* Overcharge: zweite Schicht > 100% (heller Gold-Shimmer) */
    .barOver{
      position:absolute; left:0; top:0; height:100%; width:0%; border-radius:999px; z-index:2;
      background: linear-gradient(90deg, #E8B24A, #fff4d4, #E8B24A);
      background-size:200% 100%;
      box-shadow: 0 0 16px rgba(246,210,122,0.9), 0 0 28px rgba(232,178,74,0.5);
      transition: width 650ms cubic-bezier(.2,.8,.2,1);
      animation: overShimmer 1.8s linear infinite;
    }
    @keyframes overShimmer{ 0%{background-position:0% 0} 100%{background-position:200% 0} }

    .pct{
      min-width:104px; text-align:right;
      font-family: var(--font-display);
      font-size:22px; font-weight:800; letter-spacing:0.5px;
      color: var(--gold-bright);
      text-shadow: 0 0 14px rgba(232,178,74,0.45);
    }

    /* --- Meta-Zeile --- */
    .meta{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:10px; }
    .metaLeft{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .chip{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 12px; border-radius:999px;
      background: rgba(232,178,74,0.06);
      border:1px solid rgba(232,178,74,0.22);
      color: var(--muted);
      font-size:12px; font-weight:700; letter-spacing:0.3px;
    }
    .chip .dot{ width:7px; height:7px; border-radius:50%; background:#5fd17a; box-shadow:0 0 8px #5fd17a; }
    .chip.off .dot{ background:#d1683f; box-shadow:0 0 8px #d1683f; }
    .overBadge{
      background: linear-gradient(90deg, rgba(232,178,74,0.22), rgba(246,210,122,0.22));
      border-color: rgba(246,210,122,0.6);
      color: #fff2cf;
    }
    .brand{
      font-family: var(--font-display);
      font-size:12px; letter-spacing:3px; text-transform:uppercase;
      color: var(--dim);
    }

    /* --- Konfetti --- */
    #confetti{ position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:50; }

    /* --- Donation-Puls --- */
    @keyframes donateGlow{
      0%{ box-shadow:0 0 0 rgba(232,178,74,0); }
      25%{ box-shadow:0 0 20px rgba(246,210,122,0.95), 0 0 40px rgba(232,178,74,0.5); }
      100%{ box-shadow:0 0 0 rgba(232,178,74,0); }
    }
    .barShell.bump{ animation: donateGlow 950ms ease-out; }
    @keyframes pctPop{ 0%{transform:scale(1)} 30%{transform:scale(1.3)} 100%{transform:scale(1)} }
    .pct.bump{ animation: pctPop 950ms cubic-bezier(.2,.8,.2,1); transform-origin:right center; }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>
  <div class="wrap">
    <div class="card">
      <div class="cityBg" aria-hidden="true">
        <div class="horizon"></div>
        <div class="stars"></div>
        <div class="sun"></div>
        <svg class="skyline" viewBox="0 0 980 120" preserveAspectRatio="xMidYMax slice">
          <path d="M0,120 L0,80 L40,80 L40,60 L90,60 L90,90 L130,90 L130,45 L150,45 L150,30 L165,30 L165,45 L185,45 L185,70 L240,70 L240,55 L300,55 L300,85 L340,85 L340,40 L360,40 L360,25 L372,25 L372,40 L400,40 L400,65 L470,65 L470,50 L520,50 L520,80 L560,80 L560,35 L575,35 L575,18 L585,18 L585,35 L620,35 L620,60 L690,60 L690,48 L740,48 L740,75 L800,75 L800,55 L860,55 L860,82 L920,82 L920,62 L980,62 L980,120 Z" fill="#0a0707"/>
          <g>
            <rect class="win tw" x="188" y="66" width="6" height="6"/><rect class="win" x="200" y="66" width="6" height="6"/><rect class="win" x="212" y="66" width="6" height="6"/>
            <rect class="win" x="188" y="80" width="6" height="6"/><rect class="win tw" x="200" y="80" width="6" height="6"/><rect class="win" x="212" y="80" width="6" height="6"/>
            <rect class="win" x="644" y="54" width="6" height="6"/><rect class="win tw" x="658" y="54" width="6" height="6"/><rect class="win" x="672" y="54" width="6" height="6"/>
            <rect class="win tw" x="644" y="86" width="6" height="6"/><rect class="win" x="658" y="86" width="6" height="6"/><rect class="win" x="672" y="86" width="6" height="6"/>
          </g>
        </svg>
      </div>

      <div class="header">
        <div class="title">Du bist Liberty</div>
        <div class="subtitle2">Eventzeitraum: <span class="bold">07.08.2026 18:00 – 16.08.2026 23:59</span></div>
      </div>

      <div class="barRow">
        <div class="barShell" aria-label="Fortschritt">
          <div class="barFill" id="barFill"></div>
          <div class="barOver" id="barOver"></div>
          <div class="barTicks" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="pct" id="pct">0%</div>
      </div>

      <div class="meta">
        <div class="metaLeft">
          <div class="chip off" id="chipState"><span class="dot"></span><span id="chipText">Verbinde…</span></div>
          <div class="chip overBadge" id="overBadge" style="display:none">★ ÜBER GOAL</div>
        </div>
        <div class="brand">SEKTOR</div>
      </div>
    </div>
  </div>

  <script>
  // ============================================================
  //  KONFIGURATION
  // ============================================================
  const DEFAULT_REMOTE_API = "http://116.202.174.56:8080/api/stats";

  function getParam(name, fallback){
    const url = new URL(window.location.href);
    return url.searchParams.get(name) ?? fallback;
  }

  // API-Quelle: ?api=... > gleiche Origin (http/https) > DEFAULT_REMOTE_API (file://)
  function resolveApiUrl(){
    const explicit = getParam("api", null);
    if (explicit) return explicit;
    if (window.location.protocol === "http:" || window.location.protocol === "https:"){
      return new URL("/api/stats", window.location.origin).toString();
    }
    return DEFAULT_REMOTE_API;
  }
  const API_URL = resolveApiUrl();
  const REFRESH_MS = Math.max(500, parseInt(getParam("ms", "1500"), 10) || 1500);

  function fmtTime(){
    return new Date().toLocaleTimeString("de-DE", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
  }
  function setState(text, online){
    document.getElementById("chipText").textContent = text;
    document.getElementById("chipState").classList.toggle("off", !online);
  }

  // --- Donation-Puls ---
  function pulse(){
    const shell = document.querySelector(".barShell");
    const pct = document.getElementById("pct");
    for (const el of [shell, pct]){
      if (!el) continue;
      el.classList.remove("bump");
      void el.offsetWidth;
      el.classList.add("bump");
    }
  }

  // --- Konfetti (Gold-Palette) ---
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");
  let confettiPieces = [];
  let confettiRAF = null;
  function sizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener("resize", sizeCanvas);
  sizeCanvas();
  const CONFETTI_COLORS = ["#E8B24A", "#F6D27A", "#B8801C", "#fff3d6", "#ffffff", "#7a1220"];
  function launchConfetti(n = 180){
    for (let i = 0; i < n; i++){
      confettiPieces.push({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * canvas.height * 0.3,
        r: 4 + Math.random() * 7,
        c: CONFETTI_COLORS[i % CONFETTI_COLORS.length],
        vx: -2.5 + Math.random() * 5,
        vy: 2 + Math.random() * 4.5,
        rot: Math.random() * Math.PI,
        vr: -0.25 + Math.random() * 0.5
      });
    }
    if (!confettiRAF) confettiRAF = requestAnimationFrame(stepConfetti);
  }
  function stepConfetti(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    confettiPieces = confettiPieces.filter(p => p.y < canvas.height + 40);
    for (const p of confettiPieces){
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.rot += p.vr;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.c; ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r * 0.6);
      ctx.restore();
    }
    if (confettiPieces.length){ confettiRAF = requestAnimationFrame(stepConfetti); }
    else { ctx.clearRect(0, 0, canvas.width, canvas.height); confettiRAF = null; }
  }

  let prevNetto = null, prevLaps = null, isComplete = false;

  async function tick(){
    const bar = document.getElementById("barFill");
    const over = document.getElementById("barOver");
    const pctEl = document.getElementById("pct");
    const badge = document.getElementById("overBadge");

    try{
      const res = await fetch(API_URL, { cache: "no-store" });
      if(!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();

      const goal = Number(data.goal || 0);
      const netto = Number(data.netto_total || 0);
      const percent = goal > 0 ? (netto / goal) * 100 : 0;
      const laps = Math.floor(percent / 100);

      let baseWidth, overWidth;
      if (percent <= 100){ baseWidth = Math.max(0, percent); overWidth = 0; }
      else { baseWidth = 100; let rem = (percent - 100) % 100; if (rem <= 0) rem = 100; overWidth = Math.min(rem, 100); }

      bar.style.width = baseWidth.toFixed(2) + "%";
      over.style.width = overWidth.toFixed(2) + "%";
      if (baseWidth >= 95) bar.classList.add("glow"); else bar.classList.remove("glow");
      pctEl.textContent = percent.toFixed(1) + "%";

      if (percent > 100){
        badge.style.display = "";
        badge.textContent = laps >= 2 ? ("★ GOAL ×" + laps) : "★ ÜBER GOAL";
      } else { badge.style.display = "none"; }

      if (prevNetto !== null && netto > prevNetto + 0.001) pulse();
      if (prevLaps !== null && laps > prevLaps) launchConfetti(180);
      isComplete = percent >= 100;
      prevLaps = laps; prevNetto = netto;

      setState("Live • " + fmtTime(), true);
    }catch(e){
      setState("Offline • API nicht erreichbar", false);
    }
  }

  setState("Verbinde…", false);
  tick();
  setInterval(tick, REFRESH_MS);
  setInterval(() => { if (isComplete) launchConfetti(70); }, 2500);
  </script>
</body>
</html>
