<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crime Automation — Personal-Bedarf</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div x-data="dashboard()" x-init="init()" class="max-w-screen-2xl mx-auto p-6">
    <header class="flex items-center justify-between mb-6 flex-wrap gap-3">
      <h1>
        <img src="/static/logo.png" alt="SEKT6R" class="h-12 w-auto" />
      </h1>
      <nav class="flex gap-2 text-sm flex-wrap items-center">
        <a href="/" class="px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700">Dashboard</a>
        <a href="/archive" class="px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700">Archiv</a>
        <a href="/lore" class="px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700">Lore</a>
        <a href="/story" class="px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700">Story</a>
        <a href="/mittler" class="px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700">Mittler</a>
        <a href="/personnel" class="px-3 py-1.5 rounded bg-red-700 text-white relative">
          Personal
          <span x-show="personnelUnseen > 0"
                x-text="personnelUnseen"
                class="absolute -top-1 -right-1 bg-red-600 text-white text-xs font-bold rounded-full min-w-[18px] h-[18px] px-1 flex items-center justify-center"></span>
        </a>
        <a href="/ranking" class="px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700">Ranking</a>
        <a href="/settings" class="px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700">Settings</a>
      </nav>
    </header>

    <!-- Toast (Live-Update-Benachrichtigung) -->
    <div x-show="personnelToast" x-transition
         class="fixed top-4 right-4 z-50 bg-indigo-700 text-white text-sm px-4 py-2 rounded shadow-lg"
         x-text="personnelToast"></div>
    <div x-show="personnelPostToast" x-transition
         class="fixed top-16 right-4 z-50 bg-green-700 text-white text-sm px-4 py-2 rounded shadow-lg"
         x-text="personnelPostToast"></div>

    <!-- ───── Personal-Bedarf (Live, 30s Polling) ───── -->
    <section id="personnel-widget" class="mb-6 bg-zinc-900 border border-zinc-800 rounded-lg p-4">
      <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
        <h2 class="text-lg font-semibold">
          🎭 Personal-Bedarf
          <span class="text-xs text-zinc-500 font-normal ml-1">
            (<span x-text="personnel.count"></span> Missions · Auto-Update alle 30 s)
          </span>
        </h2>
        <div class="flex items-center gap-2 flex-wrap">
          <!-- Zeitraum-Picker -->
          <div class="flex items-center gap-1 bg-zinc-950 border border-zinc-800 rounded text-xs">
            <button @click="setPersonnelMode('active')"
                    :class="personnelMode === 'active' ? 'bg-blue-700 text-white' : 'text-zinc-400 hover:text-zinc-200'"
                    class="px-2 py-1 rounded-l">Alle aktiven</button>
            <button @click="setPersonnelMode('24h')"
                    :class="personnelMode === '24h' ? 'bg-blue-700 text-white' : 'text-zinc-400 hover:text-zinc-200'"
                    class="px-2 py-1">24 h</button>
            <button @click="setPersonnelMode('7d')"
                    :class="personnelMode === '7d' ? 'bg-blue-700 text-white' : 'text-zinc-400 hover:text-zinc-200'"
                    class="px-2 py-1">7 Tage</button>
            <button @click="setPersonnelMode('30d')"
                    :class="personnelMode === '30d' ? 'bg-blue-700 text-white' : 'text-zinc-400 hover:text-zinc-200'"
                    class="px-2 py-1 rounded-r">30 Tage</button>
          </div>
          <span x-show="personnel.generated_at" class="text-xs text-zinc-500"
                x-text="`Stand: ${new Date(personnel.generated_at + 'Z').toLocaleTimeString('de-DE')}`"></span>
          <button @click="requestNotificationPermission()"
                  title="Browser-Benachrichtigungen erlauben — du wirst auch außerhalb des Tabs informiert"
                  class="text-xs px-2 py-1 rounded bg-zinc-800 hover:bg-zinc-700">
            🔔
          </button>
          <button @click="ackPersonnel()" x-show="personnelUnseen > 0"
                  title="Ungelesen-Counter zurücksetzen"
                  class="text-xs px-2 py-1 rounded bg-zinc-800 hover:bg-zinc-700">
            Markiere gelesen
          </button>
          <button @click="loadPersonnel()" class="text-xs px-2 py-1 rounded bg-blue-700 hover:bg-blue-600">
            ↻ Jetzt
          </button>
        </div>
      </div>

      <div x-show="personnel.items.length === 0" class="text-sm text-zinc-500 py-4 text-center">
        <span x-show="personnelMode === 'active'">Keine aktiven Missions im System (alle archiviert oder noch keine erstellt).</span>
        <span x-show="personnelMode !== 'active'">Keine Missions im gewählten Zeitfenster.</span>
      </div>

      <div x-show="personnel.items.length > 0" class="space-y-2">
        <template x-for="item in personnel.items" :key="item.mission_id">
          <div class="bg-zinc-950 border border-zinc-800 rounded p-3"
               :style="`border-left: 4px solid ${item.crew_color_hex}`">
            <div class="flex items-start justify-between gap-3 flex-wrap mb-2">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="font-semibold" x-text="item.crew_name"></span>
                <span class="text-xs text-zinc-500" x-show="item.crew_district"
                      x-text="`· ${item.crew_district}`"></span>
                <span class="text-xs px-2 py-0.5 rounded"
                      :class="personnelStatusBadge(item.status).cls"
                      x-text="personnelStatusBadge(item.status).label"></span>
                <span class="text-xs text-zinc-400" x-text="`⏱ ${formatSlotShort(item.slot)}`"></span>
              </div>
              <div class="flex items-center gap-2 flex-wrap">
                <a :href="`/crew/${item.crew_id}`" class="text-xs text-blue-400 hover:underline">
                  → Crew-Detail
                </a>
                <button x-show="personnelEditing !== item.mission_id && item.personnel_brief"
                        @click="postPersonnelToDiscord(item)"
                        :disabled="personnelPosting === item.mission_id"
                        :title="item.personnel_discord_message_id
                          ? 'Vorherigen Admin-Post ersetzen mit aktuellem Stand'
                          : 'In Admin-Channel posten (Spielleitung)'"
                        class="text-xs px-2 py-1 rounded bg-indigo-700 hover:bg-indigo-600 disabled:opacity-50">
                  <span x-show="personnelPosting !== item.mission_id">
                    <span x-show="item.personnel_discord_message_id">📤 Aktualisieren</span>
                    <span x-show="!item.personnel_discord_message_id">📤 Posten</span>
                  </span>
                  <span x-show="personnelPosting === item.mission_id">Sende…</span>
                </button>
                <button x-show="personnelEditing !== item.mission_id"
                        @click="startEditPersonnel(item)"
                        class="text-xs px-2 py-1 rounded bg-zinc-800 hover:bg-zinc-700">
                  ✎ Personal bearbeiten
                </button>
              </div>
            </div>

            <div x-show="item.content_snippet" class="text-xs text-zinc-500 mb-2 italic"
                 x-text="'„' + item.content_snippet + '…'"></div>

            <!-- Anzeige-Modus -->
            <div x-show="personnelEditing !== item.mission_id">
              <div x-show="item.personnel_brief"
                   class="text-sm whitespace-pre-wrap text-zinc-200"
                   x-text="item.personnel_brief"></div>
              <div x-show="!item.personnel_brief"
                   class="text-sm text-zinc-500 italic">
                — noch kein Personal definiert. Klicke „Personal bearbeiten".
              </div>
              <div x-show="item.personnel_updated_at" class="text-xs text-zinc-600 mt-1"
                   x-text="`zuletzt geändert: ${new Date(item.personnel_updated_at + 'Z').toLocaleString('de-DE')}`"></div>
            </div>

            <!-- Edit-Modus -->
            <div x-show="personnelEditing === item.mission_id" class="space-y-2">
              <!-- Quick-Pick: Vorlage laden + KI-Vorschlag -->
              <div class="flex items-center gap-2 flex-wrap">
                <label class="text-xs text-zinc-400">📋 Vorlage:</label>
                <select @change="applyPersonnelTemplate($event.target.value); $event.target.value=''"
                        class="bg-zinc-950 border border-zinc-700 rounded px-2 py-1 text-xs">
                  <option value="">— wählen —</option>
                  <template x-for="t in personnelTemplates" :key="t.id">
                    <option :value="t.id" x-text="t.label"></option>
                  </template>
                </select>
                <button @click="aiSuggestPersonnel(item)" :disabled="personnelAiBusy"
                        title="Lässt die KI einen Vorschlag passend zum Auftrag generieren"
                        class="px-2 py-1 rounded bg-purple-700 hover:bg-purple-600 disabled:opacity-50 text-xs">
                  <span x-show="!personnelAiBusy">🤖 KI-Vorschlag</span>
                  <span x-show="personnelAiBusy">KI denkt…</span>
                </button>
                <span class="text-xs text-zinc-500 ml-auto">
                  Markdown wird wörtlich angezeigt.
                </span>
              </div>
              <textarea x-model="personnelDraft" rows="10"
                        placeholder="Mittler: ..."
                        class="w-full bg-zinc-950 border border-zinc-700 rounded p-2 text-sm font-mono"></textarea>
              <div class="flex items-center gap-2">
                <button @click="savePersonnel(item)" :disabled="personnelSaving"
                        class="px-3 py-1 rounded bg-green-700 hover:bg-green-600 disabled:opacity-50 text-sm">
                  <span x-show="!personnelSaving">💾 Speichern</span>
                  <span x-show="personnelSaving">Speichere…</span>
                </button>
                <button @click="cancelEditPersonnel()" class="px-3 py-1 rounded bg-zinc-700 hover:bg-zinc-600 text-sm">
                  Abbrechen
                </button>
              </div>
            </div>
          </div>
        </template>
      </div>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
