<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crime Automation — Archiv</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div x-data="archivePage()" x-init="init()" class="max-w-screen-2xl mx-auto p-6">
    <header class="flex items-center justify-between mb-8">
      <h1>
        <img src="/static/logo.png" alt="SEKT6R" class="h-12 w-auto" />
      </h1>
      <nav class="flex gap-3 text-sm">
        <a href="/" class="px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700">Dashboard</a>
        <a href="/archive" class="px-3 py-1.5 rounded bg-red-700 text-white">Archiv</a>
        <a href="/lore" class="px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700">Lore</a>
        <a href="/story" class="px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700">Story</a>
        <a href="/mittler" class="px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700">Mittler</a>
        <a href="/ranking" class="px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700">Ranking</a>
        <a href="/settings" class="px-3 py-1.5 rounded bg-zinc-800 hover:bg-zinc-700">Settings</a>
      </nav>
    </header>

    <section class="mb-6 flex items-center justify-between flex-wrap gap-3">
      <h2 class="text-xl font-semibold">Archivierte Aufträge</h2>
      <div class="flex items-center gap-2 flex-wrap">
        <label class="text-xs text-zinc-400">Gang:</label>
        <select x-model="crewFilter"
                class="bg-zinc-950 border border-zinc-800 rounded px-2 py-1 text-sm">
          <option value="">Alle Gangs</option>
          <template x-for="c in crews" :key="c.id">
            <option :value="c.id" x-text="c.name"></option>
          </template>
        </select>
        <button @click="purgeAll()" x-show="filteredMissions.length > 0"
                :disabled="purging"
                class="text-xs px-3 py-1.5 bg-red-700 hover:bg-red-600 disabled:opacity-50 rounded text-white">
          <span x-show="!purging">🗑 Alle löschen (<span x-text="filteredMissions.length"></span>)</span>
          <span x-show="purging">Lösche…</span>
        </button>
      </div>
    </section>

    <p x-show="missions.length === 0" class="text-zinc-500">
      Keine archivierten Aufträge.
    </p>

    <div class="space-y-3">
      <template x-for="m in filteredMissions" :key="m.id">
        <article class="bg-zinc-900 border border-zinc-700 rounded-lg p-5 opacity-90">
          <header class="flex items-center justify-between mb-3 flex-wrap gap-2">
            <div class="flex items-center gap-2 text-xs flex-wrap">
              <span class="px-2 py-0.5 rounded bg-red-700 text-white font-medium" x-text="crewName(m.crew_id)"></span>
              <span class="px-2 py-0.5 rounded" :class="statusClass(m.status)" x-text="statusLabel(m.status)"></span>
              <span class="text-zinc-500" x-text="formatDate(m.created_at)"></span>
              <span class="text-zinc-600" x-text="m.ai_provider"></span>
              <span x-show="m.deadline_at" class="px-2 py-0.5 rounded bg-zinc-800 text-amber-300">
                ⏳ <span x-text="m.deadline_at ? formatDate(m.deadline_at) : ''"></span>
              </span>
              <span class="px-2 py-0.5 rounded bg-zinc-700 text-zinc-300">📦 archiviert</span>
            </div>
            <div class="flex gap-1">
              <a :href="`/api/missions/${m.id}/pdf`" target="_blank"
                 class="text-xs px-2 py-1 bg-blue-700 hover:bg-blue-600 rounded text-white"
                 title="Als PDF exportieren">📄 PDF</a>
              <button @click="restoreMission(m.id)"
                      title="Aus Archiv zurueckholen"
                      class="text-xs px-2 py-1 text-green-400 hover:text-green-300">↺</button>
              <button @click="purgeMission(m.id)"
                      title="Endgueltig loeschen"
                      class="text-xs px-2 py-1 text-red-400 hover:text-red-300">×</button>
            </div>
          </header>

          <div class="whitespace-pre-wrap text-zinc-200 leading-relaxed mb-3"
               x-text="m.content_final || m.content_generated"></div>

          <div x-show="archivedBossInfo(m).length"
               class="mt-4 pt-3 border-t border-zinc-800">
            <h4 class="text-xs font-semibold text-zinc-400 mb-2">🗨 Archiviertes Boss-Feedback</h4>
            <ul class="space-y-2">
              <template x-for="(bm, idx) in archivedBossInfo(m)" :key="idx">
                <li class="bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-sm">
                  <div class="flex items-center justify-between text-xs text-zinc-500 mb-1">
                    <span x-text="bm.author" class="font-medium text-zinc-300"></span>
                    <span x-text="formatDate(bm.posted_at)"></span>
                  </div>
                  <div x-show="bm.content" class="whitespace-pre-wrap text-zinc-200" x-text="bm.content"></div>
                  <div x-show="bm.attachments && bm.attachments.length"
                       class="mt-2 flex flex-wrap gap-2">
                    <template x-for="att in (bm.attachments || [])" :key="att.url">
                      <a :href="att.url" target="_blank" class="block">
                        <img x-show="att.content_type && att.content_type.startsWith('image/')"
                             :src="att.url" :alt="att.filename"
                             class="max-h-48 max-w-xs rounded border border-zinc-700" />
                        <span x-show="!att.content_type || !att.content_type.startsWith('image/')"
                              class="text-blue-400 underline text-xs"
                              x-text="`📎 ${att.filename}`"></span>
                      </a>
                    </template>
                  </div>
                </li>
              </template>
            </ul>
          </div>
        </article>
      </template>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
